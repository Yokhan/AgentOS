name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 35
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install frontend dependencies
        run: npm ci

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Run UI checks
        run: npm run check:ui

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

      - name: Run concurrency clippy checks
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D clippy::await_holding_lock -D clippy::mutex_atomic

      - name: Audit npm dependencies
        run: npm audit

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies
        run: cargo audit --file src-tauri/Cargo.lock

      - name: Build desktop smoke binary
        run: cargo build --manifest-path src-tauri/Cargo.toml

      - name: Run desktop lifecycle smoke
        shell: pwsh
        run: ./scripts/smoke-desktop-lifecycle.ps1
